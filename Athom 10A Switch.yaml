esphome:
  name: athom-cb0110a
  friendly_name: "Athom 10A Switch"

esp8266:
  board: esp01_1m

api:

ota:
  - platform: esphome

# Enable Webserver
web_server:
  port: 80

## ------
wifi:
  id: wlan
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "sonoff-basic-r1"
    password: "AlbArik64"
  # WiFi connection events
  on_connect:
    then:
      - script.execute: update_led_state
  on_disconnect:
    then:
      - script.execute: update_led_state

captive_portal:

# Enable logging
logger:


# LED on GPIO13 (green), inverted on Sonoff Basic R1
output:
  - platform: gpio
    pin:
      number: GPIO4
      inverted: true
    id: led_output

light:
  - platform: binary
    id: status_light
    name: "Sonoff Basic LED"
    output: led_output
    internal: true
    restore_mode: ALWAYS_OFF

# Button on GPIO0
binary_sensor:
  - platform: gpio
    id: button
    name: "Sonoff Basic Button"
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - switch.toggle: relay
        - script.execute: update_led_state

# Relay on GPIO12
switch:
  - platform: gpio
    id: relay
    name: "Sonoff Basic Relay"
    pin: GPIO13
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: update_led_state
    on_turn_off:
      then:
        - script.execute: update_led_state

# Wi‑Fi signal sensor
sensor:
  - platform: wifi_signal
    name: "Sonoff Basic Wifi Signal dB"
    id: wifi_signal_strength
    update_interval: 60s

# IP address text sensor
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Sonoff Basic IP Address"

# Helper script to manage LED behavior
script:
  - id: update_led_state
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:   # WiFi OK → LED reflects relay state
          then:
            - light.turn_off: status_light
            - if:
                condition:
                  switch.is_on: relay
                then:
                  - light.turn_on: status_light
          else:               # No WiFi → blink every 2s
            - while:
                condition:
                  not:
                    wifi.connected:
                then:
                  - light.turn_on: status_light
                  - delay: 1s
                  - light.turn_off: status_light
                  - delay: 1s
## ------

    